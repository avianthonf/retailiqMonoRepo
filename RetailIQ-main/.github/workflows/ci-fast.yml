# ============================================================================
# RetailIQ — Ultra-Fast CI for Hotfixes (<2 minutes)
# ============================================================================
# Triggered manually or on hotfix branches.
# Single job with minimal checks for emergency deployments.
# ============================================================================

name: CI Fast

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for fast CI'
        required: true
        default: 'hotfix'
  push:
    branches: ['hotfix/*', 'emergency/*']

concurrency:
  group: ci-fast-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fast-check:
    name: ⚡ Fast Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "requirements*.txt"

      - name: Create virtual environment
        run: uv venv

      - name: Install essential tools only
        run: |
          source .venv/bin/activate
          uv pip install --upgrade ruff pytest==8.1.1
          uv pip install -r requirements.txt

      - name: Ruff check (lint only)
        run: |
          source .venv/bin/activate
          ruff check . --output-format=github

      - name: Run critical tests only
        run: |
          source .venv/bin/activate
          pytest tests/ \
            -v \
            -k "critical or smoke" \
            --tb=short \
            --maxfail=5
